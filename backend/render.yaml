services:
  - type: web
    name: campus-lost-found-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false        # set this to your deployed frontend URL
      - key: DATABASE_URL
        sync: false        # optional: a Postgres URL for persistent data
